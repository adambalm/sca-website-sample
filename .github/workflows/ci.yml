name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  build:
    name: Build + Production SSR smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web workspace
        run: npm run build:web

      - name: Install Playwright browser (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Smoke test against production
        env:
          BASE_URL: https://www.springfieldcommonwealthacademy.org
        run: >
          npx playwright test tests/ssr-verification.spec.ts
          --project=desktop-chrome
          --reporter=list

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
